<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#222"/>
  <defs>
    <pattern id="brushed" width="400" height="2" patternUnits="userSpaceOnUse">
      <line x1="0" y1="1" x2="400" y2="1" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#brushed)"/>
  <rect width="400" height="400" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.05)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0.2)" />
    </linearGradient>
  </defs>
</svg>
